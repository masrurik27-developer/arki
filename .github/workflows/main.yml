name: Build APK Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Generate gradlew wrapper
        run: |
          # Generate gradle wrapper langsung dari gradle
          gradle wrapper --gradle-version 8.7
          
          # Kasih permission
          chmod +x gradlew
          
          # Verifikasi
          ls -la gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/arkidigital.jks
          echo "Keystore size: $(wc -c < app/arkidigital.jks) bytes"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArkiDigital-RAB-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ArkiDigital-RAB-AAB
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Super Estimator RAB v${{ github.run_number }}"
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          body: |
            Build otomatis #${{ github.run_number }}
            APK = Install langsung di Android
            AAB = Upload ke Google Play Store
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
